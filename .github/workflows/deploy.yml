# Nombre del flujo de trabajo
name: Deploy React App to GitHub Pages

# Se ejecuta cada vez que haces un 'push' a la rama 'main'
on:
  push:
    branches: [ "main" ]
  # AÑADIMOS ESTO: Permite ejecutar el workflow manualmente desde la pestaña Actions
  workflow_dispatch:

# Permisos necesarios
permissions:
  contents: read
  pages: write
  id-token: write

# Define el trabajo
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Clona tu repositorio
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configura Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # AÑADIMOS ESTO: Le decimos a Node dónde está su caché
          cache: 'npm'

      # NUEVO PASO: Limpia la caché de NPM por si acaso
      - name: Clean npm cache
        run: npm cache clean --force
      
      # 3. Instala las dependencias
      - name: Install dependencies
        run: npm install

      # 4. Construye la aplicación (con el secreto)
      - name: Build
        run: |
          VITE_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} npm run build

      # NUEVO PASO DE DEPURACIÓN: Lista los archivos en 'dist'
      - name: List files in dist directory
        run: ls -R dist

      # 5. Prepara la carpeta para ser publicada
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 6. Sube la carpeta 'dist'
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # 7. Despliega en GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4